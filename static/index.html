<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Document</title>
    <script src="./fixi-0.9.2.js"></script>
</head>

<body>
    <!--
    method: get is default
    fx-swap: innerHTML is default
    fx-trigger: click is default for buttons for example
    -->
    <button fx-action="/todos" fx-target="#output">
        List todos
    </button>
    <button fx-action="/todos/new" fx-target="#output">
        New todo
    </button>

    <output id="output"></output>

</body>

</html>
