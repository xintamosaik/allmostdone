<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Document</title>
    <script src="/fixi-0.9.2.js"></script>
    <link rel="stylesheet" href="/style.css">
    <!--
    fx-method: get is default
    fx-swap: innerHTML is default
    fx-trigger: click is default for buttons for example
    -->

</head>

<body id="output" style="min-height: 100vh;">
Trying to fetch initial content. See console for errors if it doesn't work.
<script>
    const output = document.getElementById('output');
    fetch("/todos/list")
        .then(response => response.text())
        .then(html => output.innerHTML = html)
        .catch(error => console.error('Error fetching initial content:', error));
</script>
</body>

</html>
